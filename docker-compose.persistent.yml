# Overlay that mounts host Claude/config state into the container for persistent mode.
# Used with: docker compose -f docker-compose.yml -f docker-compose.persistent.yml ...
# Invoked by `cc`, `cdx`, `oc`, `pidev` (default persistent mode).
services:
  agent-sandbox:
    volumes:
      # General config (shared across all tools)
      - "$HOME/.config/git:/home/agent/.config/git"
      - "$HOME/.config/gh:/home/agent/.config/gh"
      # Claude Code
      - "$HOME/.claude:/home/agent/.claude"
      - "$HOME/.claude.json:/home/agent/.claude.json"
      # Codex
      - "$HOME/.codex:/home/agent/.codex"
      # OpenCode
      - "$HOME/.config/opencode:/home/agent/.config/opencode"
      # Pi
      - "$HOME/.pi:/home/agent/.pi"
    tmpfs:
      - /home/agent/.codex/plugins/cache/openai-bundled/browser-use
      - /home/agent/.codex/plugins/cache/openai-bundled/computer-use
