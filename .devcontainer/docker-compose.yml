services:
  claude-sandbox:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: sleep infinity
    env_file: ../.env
    working_dir: /home/claude/project
    volumes:
      # Read-only host filesystem access (same as standalone)
      - ${HOME}:/home/host:ro
      # Mask secret files with /dev/null
      - /dev/null:/home/host/.npmrc:ro
    tmpfs:
      # Secrets masking — tmpfs overlays hide sensitive host directories
      - /home/host/.ssh:ro,size=0
      - /home/host/.config:ro,size=0
      - /home/host/.docker:ro,size=0
      - /home/host/.orbstack:ro,size=0
      - /home/host/Library/Keychains:ro,size=0
    network_mode: bridge
