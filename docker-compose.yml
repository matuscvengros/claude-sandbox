services:
  claude-sandbox:
    image: claude-docker-sandbox
    user: claude
    build:
      context: .
      target: ${BUILD_TARGET:-base}
      ssh:
        - default
    env_file: .env
    working_dir: /home/claude/project
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      # R/W project workspace — mounts caller's current directory
      - ${PWD}:/home/claude/project
      # SSH agent forwarding (falls back to /dev/null if no agent on host)
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
    stdin_open: true
    tty: true
    network_mode: bridge
