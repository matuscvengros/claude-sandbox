name: claude-sandbox
services:
  claude-sandbox:
    image: ghcr.io/matuscvengros/claude-sandbox:latest
    user: claude
    env_file: .env
    working_dir: ${PWD}
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    volumes:
      # R/W project workspace — 1:1 mirror of the caller's current directory
      - ${PWD}:${PWD}
      # SSH agent forwarding via OrbStack/Docker Desktop's magic host-services socket
      - /run/host-services/ssh-auth.sock:/ssh-agent
    stdin_open: true
    tty: true
    network_mode: bridge
